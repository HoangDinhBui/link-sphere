# Template for Go service deployments
# Copy and modify for each service: user-service, auth-service, post-service, comment-service, feed-service

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: linksphere/user-service:latest
          ports:
            - containerPort: 8001
          env:
            - name: SERVER_PORT
              value: "8001"
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: linksphere
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linksphere-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: linksphere
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: linksphere-secrets
                  key: jwt-secret
            - name: KAFKA_BROKERS
              value: kafka-svc:9092
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
