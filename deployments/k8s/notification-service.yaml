apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/hoangdinhbui/link-sphere/notification-service:latest
          ports:
            - containerPort: 8006
          env:
            - name: SERVER_PORT
              value: "8006"
            - name: DATABASE_URL
              value: "postgresql://linksphere:$(POSTGRES_PASSWORD)@postgres:5432/linksphere"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linksphere-secrets
                  key: postgres-password
            - name: KAFKA_BROKERS
              value: kafka-svc:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: linksphere-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8006
      targetPort: 8006
  type: ClusterIP
