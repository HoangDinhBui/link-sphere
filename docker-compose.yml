version: "3.8"

services:
  # ========================
  # Infrastructure
  # ========================
  postgres:
    image: postgres:16-alpine
    container_name: linksphere-postgres
    environment:
      POSTGRES_USER: linksphere
      POSTGRES_PASSWORD: linksphere_secret
      POSTGRES_DB: linksphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/user-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/01_users.sql
      - ./services/post-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/02_posts.sql
      - ./services/comment-service/migrations/001_init.sql:/docker-entrypoint-initdb.d/03_comments.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linksphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linksphere-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: linksphere-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: linksphere-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-topics",
          "--bootstrap-server",
          "localhost:9092",
          "--list",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.12.0
    container_name: linksphere-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  # ========================
  # API Gateway
  # ========================
  api-gateway:
    build:
      context: ./api-gateway
    container_name: linksphere-gateway
    ports:
      - "8888:80"
    depends_on:
      - user-service
      - auth-service
      - post-service
      - comment-service
      - feed-service
      - notification-service
      - search-service

  # ========================
  # Go Services
  # ========================
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: linksphere-user-service
    environment:
      SERVER_PORT: "8001"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: linksphere
      POSTGRES_PASSWORD: linksphere_secret
      POSTGRES_DB: linksphere
      JWT_SECRET: super-secret-jwt-key
      KAFKA_BROKERS: kafka:29092
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: linksphere-auth-service
    environment:
      SERVER_PORT: "8002"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: linksphere
      POSTGRES_PASSWORD: linksphere_secret
      POSTGRES_DB: linksphere
      JWT_SECRET: super-secret-jwt-key
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy

  post-service:
    build:
      context: .
      dockerfile: services/post-service/Dockerfile
    container_name: linksphere-post-service
    environment:
      SERVER_PORT: "8003"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: linksphere
      POSTGRES_PASSWORD: linksphere_secret
      POSTGRES_DB: linksphere
      JWT_SECRET: super-secret-jwt-key
      KAFKA_BROKERS: kafka:29092
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  comment-service:
    build:
      context: .
      dockerfile: services/comment-service/Dockerfile
    container_name: linksphere-comment-service
    environment:
      SERVER_PORT: "8004"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: linksphere
      POSTGRES_PASSWORD: linksphere_secret
      POSTGRES_DB: linksphere
      JWT_SECRET: super-secret-jwt-key
      KAFKA_BROKERS: kafka:29092
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  feed-service:
    build:
      context: .
      dockerfile: services/feed-service/Dockerfile
    container_name: linksphere-feed-service
    environment:
      SERVER_PORT: "8005"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: linksphere
      POSTGRES_PASSWORD: linksphere_secret
      POSTGRES_DB: linksphere
      JWT_SECRET: super-secret-jwt-key
    ports:
      - "8005:8005"
    depends_on:
      redis:
        condition: service_healthy

  # ========================
  # Python Services
  # ========================
  notification-service:
    build:
      context: ./services/notification-service
    container_name: linksphere-notification-service
    environment:
      SERVER_PORT: "8006"
      KAFKA_BROKERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: linksphere
      POSTGRES_PASSWORD: linksphere_secret
      POSTGRES_DB: linksphere
    ports:
      - "8006:8006"
    depends_on:
      kafka:
        condition: service_healthy

  search-service:
    build:
      context: ./services/search-service
    container_name: linksphere-search-service
    environment:
      SERVER_PORT: "8007"
      OPENSEARCH_URL: http://opensearch:9200
    ports:
      - "8007:8007"
    depends_on:
      - opensearch

volumes:
  postgres_data:
  opensearch_data:
